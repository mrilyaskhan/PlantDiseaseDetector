{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #74ABE2, #5563DE);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .signup-card {
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            color: #fff;
            text-align: center;
        }

        .signup-card h2 {
            margin-bottom: 30px;
            font-weight: 700;
        }

        .form-control {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            color: #fff;
            padding: 12px 15px;
            margin-bottom: 20px;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.3);
            color: #fff;
            box-shadow: none;
            border: none;
        }

        .btn-signup {
            background: #5563DE;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }

        .btn-signup:hover {
            background: #74ABE2;
        }

        .signup-card a {
            color: #fff;
            text-decoration: underline;
        }

        .signup-card a:hover {
            color: #d0e0ff;
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <h2>Sign Up</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-signup">Sign Up</button>
        </form>
        <p class="mt-3">Already have an account? <a href="{% url 'account_login' %}">Login</a></p>
    </div>
</body>
</html>
